<h1>AutoMod</h1>
<p>AutoMod機能を使用すると、メンバーが不適切なコンテンツを投稿するのを防ぐことができます。</p>
<h2>AutoModを設定・削除する</h2>
<p>AutoModは、<code>/automod create</code>コマンドで、設定することができます。</p>
<p>また、削除は<code>/automod delete</code>コマンドで、行うことができます。</p>
<p>さらに、AutoModによる処罰ログはコマンド<code>/automod modlog</code>で、設定できます。</p>
