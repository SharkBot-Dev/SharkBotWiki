<h1>SharkBotのコマンド</h1>
<p>SharkBotには様々なコマンドがあります。</p>
<h2>コマンドの種類と説明</h2>
<p>SharkBotに存在するコマンドの種類と説明です。</p>
<figure class="table">
  <table>
    <tbody>
      <tr>
        <td>名前</td>
        <td>説明</td>
        <td>その他概要</td>
      </tr>
      <tr>
        <td>スラッシュコマンド</td>
        <td><code>/</code>と入力した際に候補が表示されるコマンドです。</td>
        <td>大半のコマンドが誰でも実行できます。</td>
      </tr>
      <tr>
        <td>Prefixコマンド</td>
        <td>チャットに送信することで実行されるコマンドです。</td>
        <td>大半のコマンドが誰でも実行できます。<br>また、ベータ版コマンドもPrefixコマンドに実装されます。</td>
      </tr>
      <tr>
        <td>カスタムコマンド（Tag）</td>
        <td>/tag createで作成できるコマンドです。</td>
        <td>ユーザーがサーバーごとのコマンドを作成できます。</td>
      </tr>
    </tbody>
  </table>
</figure>
<h2>Prefixコマンドの実行方法</h2>
<p>Prefixコマンドは、以下の方法で実行できます。</p>
<ol>
  <li><code>!.コマンド名 引数</code>と入力し、送信する</li>
  <li>コマンドが実行される。</li>
</ol>
<p>また、コマンドは<code>!.help</code>で確認できます。</p>
<p>さらに、Prefixコマンドの<code>!.</code>は変更でき、<code>/settings prefix</code>で設定可能です。</p>
